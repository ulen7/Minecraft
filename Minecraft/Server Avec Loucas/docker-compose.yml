version: "3.8"

services:
  mcserver2:
    image: itzg/minecraft-server
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - 25566:25566
      - 19133:19133/udp
    environment:
      TYPE: PAPER
      SERVER_PORT: "25566"
      VERSION: "1.20.4"
      EULA: "TRUE"
      MEMORY: "2g"
      MAX_PLAYERS: "4"
      MODE: "survival"
      PVP: "false"
      RESOURCE_PACK_ENFORCE: "TRUE"
      SEED: 
      PLUGINS: 
    volumes:
      # attach the relative directory 'data' to the container's /data path
      - /home/ulen4/ulenamiserver:/data